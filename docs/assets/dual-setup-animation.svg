<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">LLM Firewall dual deployment animation</title>
  <desc id="desc">Chalkboard and neon marker diagram showing passthrough proxy mode and LiteLLM edge mode.</desc>
  <defs>
    <linearGradient id="neonFlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#24f6ff"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff38d1"/>
    </linearGradient>
    <linearGradient id="greenFlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f8ff8f"/>
      <stop offset="50%" stop-color="#28ff88"/>
      <stop offset="100%" stop-color="#24f6ff"/>
    </linearGradient>
    <filter id="chalkWobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .board { fill: #060707; }
      .dust { fill: #ffffff; opacity: .08; }
      .chalk { fill: none; stroke: #f7f5df; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; filter: url(#chalkWobble); }
      .chalk-thin { fill: none; stroke: #f7f5df; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: .8; filter: url(#chalkWobble); }
      .box { fill: rgba(255,255,255,.025); stroke: #f7f5df; stroke-width: 3; rx: 18; filter: url(#chalkWobble); }
      .title { font: 700 34px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f7f5df; letter-spacing: 1px; }
      .label { font: 700 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f7f5df; }
      .small { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d9f9ff; opacity: .9; }
      .tiny { font: 500 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f7f5df; opacity: .72; }
      .neon { fill: none; stroke: url(#neonFlow); stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; filter: url(#softGlow); stroke-dasharray: 18 24; animation: march 2.8s linear infinite; }
      .green { fill: none; stroke: url(#greenFlow); stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; filter: url(#softGlow); stroke-dasharray: 16 22; animation: march 2.4s linear infinite reverse; }
      .draw { stroke-dasharray: 1100; stroke-dashoffset: 1100; animation: draw 1.9s ease-out forwards; }
      .draw2 { animation-delay: .25s; }
      .draw3 { animation-delay: .5s; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; transform-origin: center; }
      .blink { animation: blink 1.4s ease-in-out infinite; }
      @keyframes march { to { stroke-dashoffset: -84; } }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      @keyframes pulse { 0%,100% { opacity: .8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
      @keyframes blink { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect class="board" width="1200" height="620"/>
  <g opacity=".75">
    <circle class="dust" cx="90" cy="88" r="1.3"/>
    <circle class="dust" cx="185" cy="530" r="1.1"/>
    <circle class="dust" cx="420" cy="120" r="1.5"/>
    <circle class="dust" cx="710" cy="82" r="1.2"/>
    <circle class="dust" cx="1030" cy="512" r="1.4"/>
    <circle class="dust" cx="1140" cy="180" r="1.1"/>
    <circle class="dust" cx="620" cy="560" r="1.2"/>
  </g>

  <text class="title" x="54" y="58">LLM FIREWALL DEPLOYMENT MODES</text>
  <path class="chalk-thin draw" d="M54 72 C220 83 380 65 560 75 C760 86 930 66 1140 76"/>

  <g transform="translate(42 105)">
    <text class="label" x="18" y="0">A. PASSTHROUGH PROXY</text>
    <text class="small" x="18" y="28">Drop-in OpenAI-compatible guardrail</text>
    <rect class="box draw draw2" x="0" y="58" width="175" height="112" rx="18"/>
    <rect class="box draw draw2" x="300" y="44" width="215" height="140" rx="18"/>
    <rect class="box draw draw2" x="665" y="58" width="210" height="112" rx="18"/>
    <text class="label" x="43" y="105">Client</text>
    <text class="tiny" x="38" y="134">SDK / app</text>
    <text class="label" x="334" y="96">llm-firewall</text>
    <text class="tiny" x="330" y="126">validate + inspect</text>
    <text class="tiny" x="330" y="148">DLP / tools / audit</text>
    <text class="label" x="700" y="106">Upstream</text>
    <text class="tiny" x="698" y="135">OpenAI / Azure / vLLM</text>
    <path class="chalk-thin draw draw3" d="M175 114 C218 94 252 95 300 114"/>
    <path class="chalk-thin draw draw3" d="M515 114 C577 90 614 92 665 114"/>
    <path class="neon" d="M175 114 C218 94 252 95 300 114"/>
    <path class="neon" d="M515 114 C577 90 614 92 665 114"/>
    <circle class="pulse" cx="254" cy="100" r="8" fill="#24f6ff" filter="url(#softGlow)"/>
    <circle class="pulse" cx="604" cy="100" r="8" fill="#ff38d1" filter="url(#softGlow)"/>
    <text class="tiny blink" x="225" y="82">base_url swap</text>
    <text class="tiny blink" x="560" y="82">clean traffic</text>
  </g>

  <g transform="translate(42 365)">
    <text class="label" x="18" y="0">B. LITELLM EDGE</text>
    <text class="small" x="18" y="28">Expose firewall, keep LiteLLM private</text>
    <rect class="box draw draw2" x="0" y="58" width="175" height="112" rx="18"/>
    <rect class="box draw draw2" x="288" y="34" width="470" height="156" rx="22"/>
    <rect class="chalk-thin draw draw3" x="318" y="70" width="178" height="86" rx="16"/>
    <rect class="chalk-thin draw draw3" x="548" y="70" width="178" height="86" rx="16"/>
    <rect class="box draw draw2" x="888" y="58" width="210" height="112" rx="18"/>
    <text class="label" x="43" y="105">Client</text>
    <text class="tiny" x="38" y="134">SDK / app</text>
    <text class="tiny" x="432" y="58">same host / private network</text>
    <text class="label" x="337" y="108">Firewall</text>
    <text class="tiny" x="337" y="135">public :8080</text>
    <text class="label" x="585" y="108">LiteLLM</text>
    <text class="tiny" x="582" y="135">loopback :4000</text>
    <text class="label" x="930" y="106">Providers</text>
    <text class="tiny" x="920" y="135">OpenAI / Anthropic / vLLM</text>
    <path class="chalk-thin draw draw3" d="M175 114 C222 88 250 89 318 114"/>
    <path class="chalk-thin draw draw3" d="M496 113 C520 100 530 100 548 113"/>
    <path class="chalk-thin draw draw3" d="M726 114 C792 88 834 92 888 114"/>
    <path class="green" d="M175 114 C222 88 250 89 318 114"/>
    <path class="green" d="M496 113 C520 100 530 100 548 113"/>
    <path class="green" d="M726 114 C792 88 834 92 888 114"/>
    <circle class="pulse" cx="250" cy="96" r="8" fill="#28ff88" filter="url(#softGlow)"/>
    <circle class="pulse" cx="523" cy="101" r="7" fill="#f8ff8f" filter="url(#softGlow)"/>
    <circle class="pulse" cx="820" cy="96" r="8" fill="#24f6ff" filter="url(#softGlow)"/>
    <text class="tiny blink" x="215" y="82">public edge</text>
    <text class="tiny blink" x="770" y="82">provider routing</text>
  </g>

  <g transform="translate(905 105)">
    <path class="chalk draw" d="M15 0 L220 0 L220 62 L15 62 Z"/>
    <text class="tiny" x="33" y="25">FAIL CLOSED</text>
    <text class="tiny" x="33" y="45">SANITIZED AUDIT</text>
    <path class="chalk draw draw2" d="M15 90 L220 90 L220 152 L15 152 Z"/>
    <text class="tiny" x="33" y="115">DLP + INJECTION</text>
    <text class="tiny" x="33" y="135">TOOLS + BUDGETS</text>
  </g>
</svg>
